name: Build OpenWrt Package

on:
  workflow_dispatch:

  pull_request:
    paths:
      - ".github/workflows/manual_release.yml"
      - "luci-app-3ginfo-lite/**"

  push:
    branches:
      - "main"
      - "master"
    paths:
      - ".github/workflows/manual_release.yml"
      - "luci-app-3ginfo-lite/**"

concurrency:
  group: openwrt-package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  OWRT_PKG_NAME: luci-app-3ginfo-lite
  REPO_PKG_DIR: luci-app-3ginfo-lite

jobs:
  meta:
    name: Read Package Metadata
    runs-on: ubuntu-latest
    outputs:
      pkg_version: ${{ steps.meta.outputs.pkg_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Read package version
        id: meta
        run: |
          PKG_VERSION=$(sed -n 's/^PKG_VERSION:=//p' "$REPO_PKG_DIR/Makefile" | head -n1)
          PKG_RELEASE=$(sed -n 's/^PKG_RELEASE:=//p' "$REPO_PKG_DIR/Makefile" | head -n1)

          if [ -z "$PKG_VERSION" ] || [ -z "$PKG_RELEASE" ]; then
            echo "Could not read PKG_VERSION or PKG_RELEASE from $REPO_PKG_DIR/Makefile"
            exit 1
          fi

          echo "pkg_version=${PKG_VERSION}-${PKG_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${PKG_VERSION}-${PKG_RELEASE}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: IPK (OpenWrt 24.10.5)
            sdk_version: 24.10.5
            sdk_url: https://archive.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            output_exts: "ipk"
            required_ext: ipk
            artifact_suffix: ipk
          - label: APK (OpenWrt 25.12.1)
            sdk_version: 25.12.1
            sdk_url: https://archive.openwrt.org/releases/25.12.1/targets/x86/64/openwrt-sdk-25.12.1-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            output_exts: "apk ipk"
            required_ext: apk
            artifact_suffix: apk

    env:
      SDK_DIR: ${{ github.workspace }}/openwrt-sdk-${{ matrix.artifact_suffix }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            file \
            gawk \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            rsync \
            unzip \
            wget \
            zstd

      - name: Restore OpenWrt SDK cache
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ env.SDK_DIR }}
          key: openwrt-sdk-${{ matrix.sdk_version }}-x86-64-${{ matrix.artifact_suffix }}-v1

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q "${{ matrix.sdk_url }}" -O "$RUNNER_TEMP/openwrt-sdk-${{ matrix.artifact_suffix }}.tar.zst"
          mkdir -p "$SDK_DIR"
          tar --zstd -xf "$RUNNER_TEMP/openwrt-sdk-${{ matrix.artifact_suffix }}.tar.zst" -C "$SDK_DIR" --strip-components=1

      - name: Update required feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update packages luci
          ./scripts/feeds install -a -p luci
          ./scripts/feeds install comgt sms-tool

      - name: Stage local package
        run: |
          mkdir -p "$SDK_DIR/package/$OWRT_PKG_NAME"
          rsync -a --delete "$GITHUB_WORKSPACE/$REPO_PKG_DIR/" "$SDK_DIR/package/$OWRT_PKG_NAME/"

      - name: Configure SDK
        working-directory: ${{ env.SDK_DIR }}
        run: |
          cat > .config <<EOF
          CONFIG_ALL_NONSHARED=n
          CONFIG_ALL_KMODS=n
          CONFIG_ALL=n
          CONFIG_AUTOREMOVE=n
          CONFIG_PACKAGE_${OWRT_PKG_NAME}=m
          EOF
          make defconfig

      - name: Build package only
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make package/$OWRT_PKG_NAME/clean || true
          make package/$OWRT_PKG_NAME/compile -j"$(nproc)" \
            || make package/$OWRT_PKG_NAME/compile -j1

      - name: Collect package files
        run: |
          mkdir -p "$RUNNER_TEMP/out-${{ matrix.artifact_suffix }}"
          for EXT in ${{ matrix.output_exts }}; do
            find "$SDK_DIR/bin/packages" -type f \
              \( -name "${OWRT_PKG_NAME}_*.${EXT}" -o -name "${OWRT_PKG_NAME}-*.${EXT}" \) \
              -exec cp {} "$RUNNER_TEMP/out-${{ matrix.artifact_suffix }}/" \;
          done

          if ! find "$RUNNER_TEMP/out-${{ matrix.artifact_suffix }}" -maxdepth 1 -type f -name "*.${{ matrix.required_ext }}" | grep -q .; then
            echo "No .${{ matrix.required_ext }} package was produced for ${{ matrix.label }}"
            echo "Debug: available files from SDK output path"
            find "$SDK_DIR/bin/packages" -type f | sed -n '1,200p'
            exit 1
          fi

          ls -lah "$RUNNER_TEMP/out-${{ matrix.artifact_suffix }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OWRT_PKG_NAME }}-${{ needs.meta.outputs.pkg_version }}-${{ matrix.artifact_suffix }}
          path: ${{ runner.temp }}/out-${{ matrix.artifact_suffix }}/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - meta
      - build
    if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/release-files
          merge-multiple: true

      - name: Verify release files
        run: |
          ls -lah "${{ runner.temp }}/release-files"
          if ! find "${{ runner.temp }}/release-files" -maxdepth 1 -type f | grep -q .; then
            echo "No release files found"
            exit 1
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.release_tag }}
          name: ${{ env.OWRT_PKG_NAME }} ${{ needs.meta.outputs.pkg_version }}
          body: |
            Automated package build for `${{ env.OWRT_PKG_NAME }}`.

            Source commit: `${{ github.sha }}`
            Included outputs: `ipk` and `apk` (when produced by SDK).
          files: ${{ runner.temp }}/release-files/*
          fail_on_unmatched_files: true
