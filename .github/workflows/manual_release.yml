name: Build OpenWrt Package

on:
  workflow_dispatch:

  pull_request:
    paths:
      - ".github/workflows/manual_release.yml"
      - "luci-app-3ginfo-lite/**"

  push:
    branches:
      - "main"
      - "master"
    paths:
      - ".github/workflows/manual_release.yml"
      - "luci-app-3ginfo-lite/**"

concurrency:
  group: openwrt-package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PACKAGE_NAME: luci-app-3ginfo-lite
  PACKAGE_DIR: luci-app-3ginfo-lite
  SDK_DIR: ${{ github.workspace }}/openwrt-sdk
  SDK_URL: https://archive.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst

jobs:
  build:
    name: Build IPK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Read package version
        id: meta
        run: |
          PKG_VERSION=$(sed -n 's/^PKG_VERSION:=//p' "$PACKAGE_DIR/Makefile" | head -n1)
          PKG_RELEASE=$(sed -n 's/^PKG_RELEASE:=//p' "$PACKAGE_DIR/Makefile" | head -n1)

          if [ -z "$PKG_VERSION" ] || [ -z "$PKG_RELEASE" ]; then
            echo "Could not read PKG_VERSION or PKG_RELEASE from $PACKAGE_DIR/Makefile"
            exit 1
          fi

          echo "pkg_version=${PKG_VERSION}-${PKG_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${PKG_VERSION}-${PKG_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            file \
            gawk \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            rsync \
            unzip \
            wget \
            zstd

      - name: Restore OpenWrt SDK cache
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ env.SDK_DIR }}
          key: openwrt-sdk-24.10.5-x86-64-v1

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q "$SDK_URL" -O "$RUNNER_TEMP/openwrt-sdk.tar.zst"
          mkdir -p "$SDK_DIR"
          tar --zstd -xf "$RUNNER_TEMP/openwrt-sdk.tar.zst" -C "$SDK_DIR" --strip-components=1

      - name: Update required feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          # Keep the SDK's default feed branches instead of forcing master.
          ./scripts/feeds update packages luci
          ./scripts/feeds install -a -p luci
          ./scripts/feeds install comgt sms-tool

      - name: Stage local package
        run: |
          mkdir -p "$SDK_DIR/package/$PACKAGE_NAME"
          rsync -a --delete "$GITHUB_WORKSPACE/$PACKAGE_DIR/" "$SDK_DIR/package/$PACKAGE_NAME/"

      - name: Configure SDK
        working-directory: ${{ env.SDK_DIR }}
        run: |
          cat > .config <<EOF
          CONFIG_ALL_NONSHARED=n
          CONFIG_ALL_KMODS=n
          CONFIG_ALL=n
          CONFIG_AUTOREMOVE=n
          CONFIG_PACKAGE_${PACKAGE_NAME}=m
          EOF
          make defconfig

      - name: Build package only
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make package/$PACKAGE_NAME/clean V=s || true
          make package/$PACKAGE_NAME/compile -j"$(nproc)" V=s \
            || make package/$PACKAGE_NAME/compile -j1 V=s

      - name: Collect IPK
        run: |
          mkdir -p "$RUNNER_TEMP/ipk"
          find "$SDK_DIR/bin/packages" -type f -name "${PACKAGE_NAME}_*.ipk" -exec cp {} "$RUNNER_TEMP/ipk/" \;

          if ! find "$RUNNER_TEMP/ipk" -maxdepth 1 -type f -name "*.ipk" | grep -q .; then
            echo "No IPK package was produced"
            exit 1
          fi

          ls -lah "$RUNNER_TEMP/ipk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ steps.meta.outputs.pkg_version }}
          path: ${{ runner.temp }}/ipk/*.ipk
          if-no-files-found: error
          retention-days: 14

      - name: Publish release
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ env.PACKAGE_NAME }} ${{ steps.meta.outputs.pkg_version }}
          body: |
            Automated package build for `${{ env.PACKAGE_NAME }}`.

            Source commit: `${{ github.sha }}`
            OpenWrt SDK: `${{ env.SDK_URL }}`
          files: ${{ runner.temp }}/ipk/*.ipk
          fail_on_unmatched_files: true
