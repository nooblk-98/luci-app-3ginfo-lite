#
# NoobWrt — OpenWrt SDK build & release workflow
# Builds IPK (24.10.0) and APK (25.12.1) packages and uploads both to GitHub Releases.
#
# Re-usable for any OpenWrt package:
#   - Set `pkg_name` input to override the repo-name default
#   - Set `makefile_path` input to point at a Makefile in a subdirectory
#                         leave empty to auto-detect from the repo
#   - Set `force_release` to publish even when the version hasn't changed
#

name: "Build & Release (OpenWrt SDK)"

on:
  repository_dispatch:

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from (master or main)"
        required: false
        default: "main"
      pkg_name:
        description: "Package name (default: repo name)"
        required: false
        default: ""
      makefile_path:
        description: "Path to Makefile relative to repo root (leave empty to auto-detect)"
        required: false
        default: ""

  push:
    branches:
      - "master"
      - "main"

env:
  TZ: Asia/Shanghai
  BRANCH: ${{ inputs.branch || github.ref_name }}

jobs:
  # ── 1. Determine version & create / update the GitHub Release ────────────────
  job_check:
    name: Check Version & Create Release
    runs-on: ubuntu-latest
    outputs:
      pkg_version:   ${{ steps.version.outputs.pkg_version }}
      pkg_name:      ${{ steps.version.outputs.pkg_name }}
      makefile_path: ${{ steps.version.outputs.makefile_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.BRANCH }}

      - name: Resolve inputs & read version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ── resolve pkg_name ──────────────────────────────────────────────────
          PKG_NAME="${{ inputs.pkg_name }}"
          if [ -z "$PKG_NAME" ]; then
            PKG_NAME="${{ github.event.repository.name }}"
          fi

          # ── resolve makefile path ─────────────────────────────────────────────
          MK_PATH="${{ inputs.makefile_path }}"
          if [ -z "$MK_PATH" ]; then
            # Auto-detect: find the first Makefile containing PKG_VERSION
            MK_PATH=$(grep -rl 'PKG_VERSION:=' --include='Makefile' . | head -1)
            if [ -z "$MK_PATH" ]; then
              echo "ERROR: Could not auto-detect a Makefile with PKG_VERSION"
              exit 1
            fi
            # Normalize path (strip leading ./)
            MK_PATH="${MK_PATH#./}"
          fi
          echo "Using Makefile: $MK_PATH"

          # ── read PKG_VERSION from the Makefile ────────────────────────────────
          PKG_VER=$(grep -oP 'PKG_VERSION:=\K.*' "$MK_PATH" | head -1)
          if [ -z "$PKG_VER" ]; then
            echo "ERROR: Could not read PKG_VERSION from $MK_PATH"
            exit 1
          fi
          TAG="v${PKG_VER}"

          echo "pkg_name=$PKG_NAME"     >> $GITHUB_OUTPUT
          echo "makefile_path=$MK_PATH" >> $GITHUB_OUTPUT
          echo "pkg_version=$TAG"       >> $GITHUB_OUTPUT
          echo "Detected: pkg=$PKG_NAME  makefile=$MK_PATH  version=$TAG"

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.pkg_version }}"
          LATEST_TAG=$(gh release list --limit 10 --json tagName -q '.[].tagName' \
            | grep -v "^${TAG}$" | head -1 || true)

          if [ -n "$LATEST_TAG" ] && git rev-parse "${LATEST_TAG}" >/dev/null 2>&1; then
            BASE="${LATEST_TAG}"
          else
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi

          CHANGELOG=$(git log "${BASE}"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          [ -z "$CHANGELOG" ] && CHANGELOG="- No changes recorded"

          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            echo "${CHANGELOG}"
            echo ""
            echo "**Full diff:** [\`${BASE:0:7}\` → \`${TAG}\`](https://github.com/${{ github.repository }}/compare/${BASE}...HEAD)"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.pkg_version }}
          name: "${{ steps.version.outputs.pkg_name }} ${{ steps.version.outputs.pkg_version }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false

  # ── 2. Build matrix: IPK (24.10.0) + APK (25.12.1) ──────────────────────────
  job_build:
    name: "Build ${{ matrix.label }}"
    needs: job_check
    if: always() && needs.job_check.result == 'success'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - label:       "IPK — OpenWrt 24.10.5"
            sdk_version: "24.10.5"
            sdk_url:     "https://archive.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
            sdk_dir:     "sdk"
            out_dir:     "output"
            pkg_ext:     "ipk"

          - label:       "APK — OpenWrt 25.12.1"
            sdk_version: "25.12.1"
            sdk_url:     "https://archive.openwrt.org/releases/25.12.1/targets/x86/64/openwrt-sdk-25.12.1-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            sdk_dir:     "sdk-apk"
            out_dir:     "output-apk"
            pkg_ext:     "apk ipk"

    env:
      PKG_NAME: ${{ needs.job_check.outputs.pkg_name }}
      MK_PATH:  ${{ needs.job_check.outputs.makefile_path }}
      SDK_DIR:  ${{ matrix.sdk_dir }}
      OUT_DIR:  ${{ matrix.out_dir }}
      BRANCH:   ${{ inputs.branch || github.ref_name }}

    steps:
      - name: Install build dependencies
        run: |
          # Install newer CMake (3.31+) required by some LuCI feed packages
          wget -qO /tmp/cmake-install.sh https://cmake.org/files/v3.31/cmake-3.31.7-linux-x86_64.sh
          sudo sh /tmp/cmake-install.sh --prefix=/usr/local --skip-license --exclude-subdir
          cmake --version

          sudo -E apt-get -qq update
          sudo -E apt-get -qq install --no-install-recommends \
            zstd build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-venv \
            rsync unzip zlib1g-dev file wget
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Restore SDK cache
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ matrix.sdk_dir }}
          key: openwrt-sdk-${{ matrix.sdk_version }}-x86-64-v3

      - name: Download & bootstrap SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q "${{ matrix.sdk_url }}"
          FILE=$(basename "${{ matrix.sdk_url }}")
          mkdir "$SDK_DIR"
          tar --zstd -xf "$FILE" -C "$SDK_DIR" --strip-components=1

          cd "$SDK_DIR"
          echo "src-git-full packages https://github.com/openwrt/packages.git;master"   >  feeds.conf
          echo "src-git-full luci https://github.com/openwrt/luci.git;master"           >> feeds.conf
          echo "src-git-full routing https://git.openwrt.org/feed/routing.git;master"   >> feeds.conf

          ./scripts/feeds update -a

      - name: Clone / update package source
        run: |
          PKG_DIR="$SDK_DIR/package/downloads/$PKG_NAME"

          if [ -d "$PKG_DIR/.git" ]; then
            # Cache hit — just pull latest
            git -C "$PKG_DIR" fetch origin "$BRANCH"
            git -C "$PKG_DIR" reset --hard "origin/$BRANCH"
          else
            git clone --depth=1 -b "$BRANCH" \
              "https://github.com/${{ github.repository }}.git" \
              "$PKG_DIR"
          fi

          # If Makefile is in a subdirectory, promote it to the package root
          # e.g. MK_PATH=luci-app-3ginfo-lite/Makefile → subdir=luci-app-3ginfo-lite
          if [ "$MK_PATH" != "Makefile" ]; then
            PKG_SUBDIR=$(dirname "$MK_PATH")
            cp -a "$PKG_DIR/$PKG_SUBDIR/." "$PKG_DIR/"
          fi

      - name: Install feeds & configure
        run: |
          cd "$SDK_DIR"
          ./scripts/feeds install -d n "$PKG_NAME"

          echo "CONFIG_ALL_NONSHARED=n"       >  .config
          echo "CONFIG_ALL_KMODS=n"           >> .config
          echo "CONFIG_ALL=n"                 >> .config
          echo "CONFIG_AUTOREMOVE=n"          >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y"   >> .config
          echo "CONFIG_PACKAGE_${PKG_NAME}=m" >> .config
          make defconfig

      - name: Build package
        id: compile
        run: |
          cd "$SDK_DIR"
          make package/${PKG_NAME}/clean   V=s -j$(nproc) 2>/dev/null || true
          make package/${PKG_NAME}/compile V=s -j$(nproc) \
            || make package/${PKG_NAME}/compile V=s -j1

          cd ..
          mkdir -p "$OUT_DIR"
          for EXT in ${{ matrix.pkg_ext }}; do
            find "$SDK_DIR/bin/packages/" -name "${PKG_NAME}_*.${EXT}" \
              -exec cp {} "$OUT_DIR/" \; 2>/dev/null || true
          done

          echo "status=success" >> $GITHUB_OUTPUT
          echo "OUT_PATH=$PWD/$OUT_DIR" >> $GITHUB_ENV

      - name: Upload packages to release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.job_check.outputs.pkg_version }}
          files: ${{ env.OUT_PATH }}/*
          fail_on_unmatched_files: false
